<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Jack Flintermann Reed</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🦑</text></svg>">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            color: #1a1a1a;
            background: #fff;
            line-height: 1.6;
            padding: 3rem 1.5rem;
            max-width: 480px;
            margin: 0 auto;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 0.75rem;
        }

        .bio {
            color: #777;
            margin-bottom: 2rem;
        }

        .bio a { color: #555; }
        .bio a:hover { color: #1a1a1a; }

        h2 {
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #999;
            margin-bottom: 0.75rem;
        }

        section { margin-bottom: 2rem; }

        ul { list-style: none; }

        li { margin-bottom: 0.5rem; }

        a { color: #1a1a1a; text-decoration: none; }
        a:hover { text-decoration: underline; }

        .desc { color: #999; }

        @media (prefers-color-scheme: dark) {
            body { background: #111; color: #e5e5e5; }
            .bio { color: #999; }
            .bio a { color: #bbb; }
            .bio a:hover { color: #e5e5e5; }
            a { color: #e5e5e5; }
            h2 { color: #666; }
            .desc { color: #666; }
        }
    </style>
</head>
<body>
    <h1>Jack Flintermann Reed</h1>
    <p class="bio">
        I'm a software engineer and product person from NYC. Currently building <a href="https://increase.com">Increase</a>, previously at <a href="https://stripe.com">Stripe</a>. I also like to make games, such as <a href="https://lifeforc.es">Life Forces</a>, <a href="https://highphone.app">high phone</a>, and <a href="https://aholenew.world">Cyberhole 2021</a>.
    </p>
</body>
</html>
